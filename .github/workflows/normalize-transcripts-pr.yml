name: Build normalized transcript artifact

on:
  pull_request:
    branches: [master]
    paths:
      - ".github/trigger-normalize"

permissions:
  contents: read
  models: read

jobs:
  normalize:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Normalize transcripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL: openai/gpt-4.1-mini
          BATCH_SIZE: "4"
          MAX_RETRIES: "6"
        run: python scripts/normalize_transcripts.py

      - name: Upload normalized Markdown
        uses: actions/upload-artifact@v4
        with:
          name: normalized-transcripts
          path: |
            **/*.md
            transcript-normalization-failures.txt
          if-no-files-found: error
          retention-days: 1
