name: Normalize WhisperX transcripts

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/normalize-transcripts.yml"
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: normalize-whisperx-transcripts
  cancel-in-progress: false

jobs:
  normalize:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Normalize transcripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL: openai/gpt-4.1-mini
          BATCH_SIZE: "4"
          MAX_RETRIES: "6"
        run: python scripts/normalize_transcripts.py

      - name: Commit generated Markdown files
        run: |
          if git diff --quiet -- '*.md' transcript-normalization-failures.txt; then
            echo "No generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.md' transcript-normalization-failures.txt
          git commit -m "Normalize remaining WhisperX transcripts"
          git push origin HEAD:master
